<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bp-entry-card test</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
      }

      .page {
        max-width: 640px;
        margin: 2rem auto;
        padding: 1rem;
      }

      .title {
        margin: 0 0 1rem;
      }

      ha-card {
        display: block;
        background: #ffffff;
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .card-content {
        display: grid;
        gap: 0.5rem;
      }

      label {
        font-weight: 600;
      }

      input,
      button {
        font: inherit;
        padding: 0.55rem 0.7rem;
        border-radius: 8px;
        border: 1px solid #d1d5db;
      }

      button {
        cursor: pointer;
        border: 0;
        color: white;
        background: #2563eb;
        margin-top: 0.5rem;
      }

      .note {
        margin-top: 1rem;
        color: #4b5563;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="title">bp-entry-card local test</h1>
      <bp-entry-card id="card"></bp-entry-card>
      <p class="note">Open DevTools to see mock service payloads.</p>
    </main>

    <script type="module">
      async function initCard() {
        const search = new URLSearchParams(window.location.search);
        const version = search.get("v") ?? String(Date.now());

        await import(`../src/bp-entry-card.js?v=${encodeURIComponent(version)}`);
        await customElements.whenDefined("bp-entry-card");

        const card = document.getElementById("card");
        card.setConfig({});
        card.hass = {
          async callService(domain, service, data) {
            console.log("Mock callService", { domain, service, data });
            await new Promise((resolve) => setTimeout(resolve, 250));
          },
        };
      }

      initCard().catch((err) => {
        console.error("Failed to initialize test card", err);
      });
    </script>
  </body>
</html>
