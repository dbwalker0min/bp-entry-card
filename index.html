<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bp-entry-card</title>
    <style>
      :root {
        color-scheme: light;
        background: #f3f4f6;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100svh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 36%),
          linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
        color: #111827;
      }

      .page {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      .title {
        margin: 0 0 1rem;
        font-size: clamp(1.6rem, 2vw + 1rem, 2.4rem);
      }

      .note {
        margin: 1rem 0 0;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1 class="title">bp-entry-card local test</h1>
      <bp-entry-card id="card"></bp-entry-card>
      <p class="note">Open DevTools to see mock service payloads.</p>
    </main>

    <script type="module">
      async function initCard() {
        const search = new URLSearchParams(window.location.search);
        const version = search.get("v") ?? String(Date.now());

        await import(`./src/bp-entry-card.js?v=${encodeURIComponent(version)}`);
        await customElements.whenDefined("bp-entry-card");

        const card = document.getElementById("card");
        card.setConfig({});
        card.hass = {
          async callService(domain, service, data) {
            console.log("Mock callService", { domain, service, data });
            await new Promise((resolve) => setTimeout(resolve, 250));
          },
        };
      }

      initCard().catch((err) => {
        console.error("Failed to initialize test card", err);
      });
    </script>
  </body>
</html>
