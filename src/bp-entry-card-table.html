<ha-card header="Blood Pressure">
  <div class="card-content">
    <table class="bp-table">
      <tr>
        <td class="bp-label">Time</td>
        <td class="bp-time-cell">
          <input id="time" class="bp-time" type="datetime-local">
        </td>
        <td>
          <button id="now" type="button" class="bp-now">Now</button>
        </td>
      </tr>
      <tr>
        <td class="bp-label">Reading</td>
        <td class="bp-reading">
          <input
            id="systolic"
            class="bp-number bp-field"
            type="number"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="120"
            aria-label="Systolic"
          >
          <span aria-hidden="true">/</span>
          <input
            id="diastolic"
            class="bp-number bp-field"
            type="number"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="80"
            aria-label="Diastolic"
          >
          <span aria-hidden="true">&hearts;</span>
          <input
            id="pulse"
            class="bp-number bp-field"
            type="number"
            inputmode="numeric"
            min="1"
            step="1"
            placeholder="72"
            aria-label="Pulse"
          >
        </td>
        <td>
          <button id="save" type="button" class="bp-save">Save</button>
        </td>
      </tr>
    </table>
    <div id="status"></div>
  </div>
</ha-card>
